version: "3.9"

services:
  fastapi:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastapi
    environment:
      - FASTAPI_URL=http://fastapi:8000
    networks:
      - app-network

  express:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: express
    ports:
      - "5000:5000"  # frontend communicates with this
    environment:
      - FASTAPI_URL=http://fastapi:8000
    networks:
      - app-network
    depends_on:
      - fastapi

networks:
  app-network:
    driver: bridge
